<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>フィギュBOX</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
      background: #f5f5f7;
      color: #1d1d1f;
      line-height: 1.8;
    }
    .hero {
      background: #fff;
      text-align: center;
      padding: 64px 24px 48px;
      border-bottom: 1px solid #e5e5e5;
    }
    .app-icon {
      width: 100px;
      height: 100px;
      border-radius: 22px;
      overflow: hidden;
      display: inline-block;
      margin-bottom: 24px;
      box-shadow: 0 0 0 1px rgba(0,0,0,0.1);
    }
    .app-icon img {
      width: 100%;
      height: 100%;
      display: block;
    }
    h1 {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 12px;
    }
    .tagline {
      font-size: 16px;
      color: #6e6e73;
      max-width: 480px;
      margin: 0 auto 32px;
    }
    .btn {
      display: inline-block;
      background: #007aff;
      color: #fff;
      text-decoration: none;
      padding: 14px 32px;
      border-radius: 980px;
      font-size: 15px;
      font-weight: 600;
      transition: background 0.2s;
    }
    .btn:hover { background: #0066d6; }
    .links {
      max-width: 600px;
      margin: 48px auto;
      padding: 0 24px;
      display: grid;
      gap: 12px;
    }
    .link-card {
      background: #fff;
      border-radius: 12px;
      padding: 20px 24px;
      text-decoration: none;
      color: inherit;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border: 1px solid #e5e5e5;
      transition: box-shadow 0.2s;
    }
    .link-card:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
    .link-card-label { font-size: 15px; font-weight: 600; }
    .link-card-desc { font-size: 13px; color: #6e6e73; margin-top: 2px; }
    .link-card-arrow { color: #c7c7cc; font-size: 20px; }
    footer {
      text-align: center;
      padding: 32px 24px;
      font-size: 13px;
      color: #6e6e73;
    }
  </style>
</head>
<body>
  <div class="hero">
    <div class="app-icon"><img src="/app-icon.png" alt="フィギュBOX"></div>
    <h1>フィギュBOX</h1>
    <p class="tagline">フィギュアコレクションを美しく管理。写真・価格・状態を記録して、あなたのコレクションをもっと楽しく。</p>
    <a class="btn" href="https://apps.apple.com/jp/app/id6771635372">App Store でダウンロード</a>
  </div>

  <div class="links">
    <a class="link-card" href="/figubox/support/">
      <div>
        <div class="link-card-label">サポート</div>
        <div class="link-card-desc">お問い合わせ・不具合報告</div>
      </div>
      <span class="link-card-arrow">›</span>
    </a>
    <a class="link-card" href="https://grizzly-virgo-696.notion.site/365005e6816a8029bcd5e58712cd9965" target="_blank" rel="noopener">
      <div>
        <div class="link-card-label">プライバシーポリシー</div>
        <div class="link-card-desc">個人情報の取り扱いについて</div>
      </div>
      <span class="link-card-arrow">›</span>
    </a>
    <a class="link-card" href="https://grizzly-virgo-696.notion.site/365005e6816a80db9c28cb4e7879692f" target="_blank" rel="noopener">
      <div>
        <div class="link-card-label">利用規約</div>
        <div class="link-card-desc">ご利用にあたっての規約</div>
      </div>
      <span class="link-card-arrow">›</span>
    </a>
  </div>

  <footer>
    <p>© 2024 フィギュBOX</p>
  </footer>
</body>
</html>
